<!DOCTYPE html>
<html>
<head>
  <title>Bookstore UI</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>📚 Bookstore Dashboard</h1>

  <div class="container">

    <div class="card">
      <h2>Books</h2>
      <button onclick="loadBooks()">Load Books</button>
      <div id="books"></div>
    </div>

    <div class="card">
      <h2>Authors</h2>
      <button onclick="loadAuthors()">Load Authors</button>
      <div id="authors"></div>
    </div>

  </div>

  <script src="script.js"></script>

</body>
</html>
